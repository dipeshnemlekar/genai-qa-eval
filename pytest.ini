[pytest]
log_cli = true
log_cli_level = ERROR
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S
log_file = logs/pytest.log
markers =
    safety: marks tests as safety related
    rag: marks tests as rag related
    adversarial: marks tests as adversarial red-team attacks
    security: marks tests as security / attack resistance tests
    privacy: marks tests as PII and data-leakage tests
human_eval = True
auto_dashboard = true
filterwarnings =
    ignore::DeprecationWarning
